<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royals Softball 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F0F2F8;color:#0D1B3E;font-family:system-ui,-apple-system,sans-serif}

/* Header */
.hdr{background:#0A1F6B;border-bottom:3px solid #F0B429;padding:10px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,31,107,.25)}
.hdr img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.hdr .ttl{font-size:24px;font-weight:800;letter-spacing:3px;color:#fff;line-height:1}
.hdr .sub{font-size:10px;color:#F0B429;letter-spacing:2px;text-transform:uppercase}

/* Nav */
.nav{background:#0A1F6B;border-bottom:1px solid rgba(255,255,255,.1);display:flex;overflow-x:auto}
.nav button{padding:12px 16px;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav button.on{color:#fff;border-bottom-color:#F0B429}

/* Layout */
.content{padding:14px;max-width:1000px;margin:0 auto}
.gap{height:12px}
.lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.lbl-purple{color:#5B21B6}
.lbl-blue{color:#1A45C0}
.lbl-gold{color:#C9960C}
.lbl-soft{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#5A6B8A;text-transform:uppercase;margin-bottom:10px}
.lbl-soft.mt{margin:18px 0 8px}

/* Cards */
.card{background:#FFFFFF;border:1px solid #D4DAF0;border-radius:14px;padding:18px;cursor:pointer;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-purple{border-left:4px solid #5B21B6}
.card-purple:hover{box-shadow:0 4px 16px rgba(91,33,182,.12)}
.card-blue{border-left:4px solid #1A45C0}
.card-blue:hover{box-shadow:0 4px 16px rgba(26,69,192,.12)}
.card-upcoming{background:#FFFFFF;border:1px solid #D4DAF0;border-left:4px solid #F0B429;border-radius:14px;padding:18px;margin-bottom:14px;cursor:default;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tour-box{background:#FFFFFF;border:1px solid #D4DAF0;border-left:4px solid #1A45C0;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.tour-row{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;border-bottom:1px solid #EEF1F8;transition:background .15s}
.tour-row:last-child{border-bottom:none}
.tour-row:hover{background:#F4F6FC}
.tour-row .info{flex:1;min-width:0}
.tour-row .name{font-size:16px;font-weight:800;color:#0D1B3E}
.tour-row .place{display:inline-block;margin-left:8px;font-size:11px;font-weight:800;color:#8A6D00;background:#FEF3C7;border:1px solid #F0B429;border-radius:999px;padding:1px 8px;vertical-align:middle;letter-spacing:.3px}
.tour-row .meta{font-size:12px;color:#5A6B8A;margin-top:2px}
.tour-row .stats{display:flex;align-items:center;gap:14px;flex-shrink:0}
.tour-row .rec{font-size:18px;font-weight:800;color:#0A1F6B;font-family:monospace;letter-spacing:.5px}
.tour-row .diff{font-size:12px;font-weight:700;letter-spacing:.5px;font-family:monospace}
.tour-row .diff.pos{color:#1A7A40}
.tour-row .diff.neg{color:#B02020}
.tour-row .diff.zero{color:#5A6B8A}
.tour-row .arr{color:#A0AABF;font-size:18px;flex-shrink:0}
.card-upcoming .nm{font-size:16px;font-weight:800;color:#0D1B3E;margin-bottom:2px}
.card-upcoming .meta{font-size:13px;color:#5A6B8A}
.card-mini{background:#FFFFFF;border:1px solid #D4DAF0;border-radius:10px;padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-mini:hover{background:#F4F6FC}
.sched-card{background:#FFFFFF;border:1px solid #D4DAF0;border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* Card text */
.card .nm{font-size:20px;font-weight:800;color:#0D1B3E;margin-bottom:2px}
.card .meta{font-size:13px;color:#5A6B8A}
.card .cta{margin-top:10px;font-size:12px;font-weight:600}
.card-purple .cta{color:#5B21B6}
.card-blue .cta{color:#1A45C0}

/* Record bar (home tournament card) */
.record-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:14px}
.record-big{font-size:38px;font-weight:800;color:#0A1F6B;line-height:1}
.record-stat{text-align:center}
.record-num{font-size:22px;font-weight:700;color:#0D1B3E}
.record-lbl{font-size:10px;color:#5A6B8A;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.record-divider{width:1px;height:36px;background:#D4DAF0}

/* Back button */
.back{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:#FFFFFF;border:1px solid #D4DAF0;border-radius:8px;cursor:pointer;font-size:13px;color:#1A45C0;font-weight:600;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.back:hover{background:#EEF2FF}

/* Page heads */
.h1{font-size:18px;font-weight:800;color:#0D1B3E;margin-bottom:2px}
.h1-big{font-size:20px;font-weight:800;color:#0D1B3E;margin-bottom:4px}
.sub-soft{font-size:13px;color:#5A6B8A;margin-bottom:18px}
.sub-soft.tight{margin-bottom:16px}

/* Hero (tournament/game banner) */
.hero{background:#0A1F6B;border-radius:12px;padding:16px 18px;margin-bottom:16px}
.hero .lbl{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.hero .nm{font-size:20px;font-weight:800;color:#fff}
.hero .meta{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px}
.hero .rec{font-size:14px;color:#F0B429;margin-top:6px;font-weight:700}

.hero-game{background:#0A1F6B;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.hero-game .score{font-size:26px;font-weight:800;color:#fff;letter-spacing:.5px}
.hero-game .nm{font-size:14px;color:#F0B429;font-weight:700}
.hero-game .meta{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}

/* Badges */
.bdg{font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 9px;border-radius:5px;flex-shrink:0;min-width:46px;text-align:center}
.bdg-home{background:#FEF3C7;color:#92400E}
.bdg-away{background:#EEF2FF;color:#1A45C0}
.bdg-w{background:#E6F7EE;color:#1A7A40;font-size:12px;padding:4px 11px}
.bdg-l{background:#FDEAEA;color:#B02020;font-size:12px;padding:4px 11px}
.bdg-w-hero{background:#E6F7EE;color:#1A7A40;font-size:13px;padding:4px 12px;font-weight:700;letter-spacing:1px;border-radius:5px;flex-shrink:0}
.bdg-l-hero{background:#FDEAEA;color:#B02020;font-size:13px;padding:4px 12px;font-weight:700;letter-spacing:1px;border-radius:5px;flex-shrink:0}

/* Game list rows */
.glist{background:#FFFFFF;border:1px solid #D4DAF0;border-radius:10px;padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.glist:hover{background:#F4F6FC}
.glist .score{font-size:22px;font-weight:800;color:#0D1B3E;flex-shrink:0;min-width:65px}
.glist .info{flex:1}
.glist .nm{font-size:14px;color:#0A1F6B;font-weight:700}
.glist .meta{font-size:12px;color:#5A6B8A;margin-top:2px}
.glist .arr{font-size:18px;color:#A0AABF}

/* Tip banner */
.tip{background:#EEF2FF;border-left:3px solid #1A45C0;border-radius:6px;padding:8px 12px;font-size:12px;color:#0A1F6B;margin-bottom:12px;font-weight:500}

/* Stats table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid #D4DAF0;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 10px;white-space:nowrap;background:#F4F6FC;color:#5A6B8A;font-size:11px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;text-align:right;border-bottom:2px solid #D4DAF0}
.tbl th.cn{text-align:left;position:sticky;left:0;min-width:110px;border-right:1px solid #D4DAF0}
.tbl th.cpa{color:#1A45C0;border-right:1px solid #D4DAF0}
.tbl td{padding:9px 10px;white-space:nowrap;font-size:13px;border-bottom:1px solid #D4DAF0;text-align:right;color:#0D1B3E;background:#FFFFFF;font-family:monospace}
.tbl td.cn{text-align:left;font-weight:600;position:sticky;left:0;min-width:110px;border-right:1px solid #D4DAF0;font-family:system-ui,-apple-system,sans-serif}
.tbl td.cpa{color:#1A45C0;border-right:1px solid #D4DAF0}
.tbl tbody tr:hover td{background:#EEF2FF !important}
.tbl tfoot td{padding:9px 10px;white-space:nowrap;font-size:13px;border-top:2px solid #D4DAF0;background:#F4F6FC;color:#0A1F6B;font-weight:700;font-family:monospace;text-align:right}
.tbl tfoot td.cn{text-align:left;position:sticky;left:0;border-right:1px solid #D4DAF0}
.tbl tfoot td.cpa{color:#1A45C0;border-right:1px solid #D4DAF0}

/* Stat coloring */
.s-elite{color:#166534}
.s-good{color:#1A7A40}
.s-poor{color:#B02020}
.s-mute{color:#A0AABF}
.s-soft{color:#5A6B8A}

/* Empty state */
.empty{background:#FFFFFF;border:1px solid #D4DAF0;border-radius:12px;padding:36px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.empty .ico{font-size:36px;margin-bottom:12px}
.empty .ttl{font-size:17px;font-weight:700;color:#0D1B3E;margin-bottom:6px}
.empty .desc{font-size:13px;color:#5A6B8A;line-height:1.7}

/* Two-column grid */
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card-stat{background:#FFFFFF;border:1px solid #D4DAF0;border-radius:12px;padding:18px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.card-stat:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card-stat-rs{border-top:3px solid #16A34A}
.card-stat-po{border-top:3px solid #C9960C}
.card-stat .lbl-stat{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.card-stat .num-big{font-size:30px;font-weight:800;line-height:1;margin-bottom:4px}
.card-stat .meta{font-size:12px;color:#5A6B8A;font-weight:500}
.card-stat .cta{margin-top:12px;font-size:12px;font-weight:600}
.card-stat-rs .lbl-stat{color:#16A34A}
.card-stat-rs .cta{color:#16A34A}
.card-stat-po .lbl-stat{color:#C9960C}
.card-stat-po .cta{color:#C9960C}
</style>
</head>

// ============== HELPERS ==============
function clone(o){return JSON.parse(JSON.stringify(o));}
function emptyStat(){return {pa:0,ab:0,h:0,b1:0,b2:0,b3:0,hr:0,r:0,rbi:0,bb:0,k:0,g:0};}

// Aggregate raw counting stats from list of game stat objects
function sumStat(games, name){
  const t = emptyStat();
  for(const g of games){
    if(g.stats && g.stats[name]){
      const s = g.stats[name];
      t.g++;
      for(const k of ['pa','ab','h','b1','b2','b3','hr','r','rbi','bb','k']) t[k] += s[k]||0;
    }
  }
  return t;
}

// Sum all players' stats across games (team totals)
function sumTeam(games){
  const t = emptyStat();
  delete t.g;
  for(const g of games){
    if(!g.stats) continue;
    for(const name in g.stats){
      const s = g.stats[name];
      for(const k of ['pa','ab','h','b1','b2','b3','hr','r','rbi','bb','k']) t[k] += s[k]||0;
    }
  }
  return t;
}

// Compute derived stats from raw counting stats
function calc(s){
  const pa=s.pa||0, ab=s.ab||0, h=s.h||0, b1=s.b1||0, b2=s.b2||0, b3=s.b3||0, hr=s.hr||0, bb=s.bb||0;
  const sac = Math.max(0, pa - ab - bb);  // implicit sacrifice count
  const avg = ab>0 ? h/ab : 0;
  const obp = (ab+bb+sac)>0 ? (h+bb)/(ab+bb+sac) : 0;
  const tb = b1 + 2*b2 + 3*b3 + 4*hr;
  const slg = ab>0 ? tb/ab : 0;
  const ops = obp + slg;
  // wOBA weights (slow-pitch friendly approximation): BB .69, 1B .89, 2B 1.27, 3B 1.62, HR 2.10
  const woba = (ab+bb+sac)>0 ? (.69*bb + .89*b1 + 1.27*b2 + 1.62*b3 + 2.10*hr) / (ab+bb+sac) : 0;
  return {avg, obp, slg, ops, woba, sac};
}

// Format helpers
function fmtAvg(v){return v.toFixed(3).replace(/^0/,'');}  // .667 etc
function fmtOps(v){return v.toFixed(3);}                    // 1.603
function fmtInt(v){return v===0 ? '<span class="s-mute">&mdash;</span>' : String(v);}
function fmtNum(v){return String(v);}  // for PA/AB/H even when 0

// Coloring thresholds
function colAvg(v){if(v>=.700)return 's-elite';if(v>=.500)return 's-good';if(v<.250&&v>0)return 's-poor';if(v===0)return 's-poor';return '';}
function colObp(v){if(v>=.700)return 's-elite';if(v>=.500)return 's-good';if(v<.300&&v>0)return 's-poor';if(v===0)return 's-poor';return '';}
function colSlg(v){if(v>=.700)return 's-elite';if(v>=.500)return 's-good';if(v<.300&&v>0)return 's-poor';if(v===0)return 's-poor';return '';}
function colOps(v){if(v>=1.0)return 's-elite';if(v>=.700)return 's-good';if(v<.500&&v>0)return 's-poor';if(v===0)return 's-poor';return '';}
function colWoba(v,teamWoba){if(v>=teamWoba+.05)return 's-elite';if(v>=teamWoba-.05)return '';if(v>0)return 's-poor';return 's-poor';}
function colOpsPlus(v){if(v>=120)return 's-elite';if(v>=100)return 's-good';if(v<80&&v>0)return 's-poor';if(v===0)return 's-poor';return 's-soft';}

// Standard OPS+ formula: 100 * ((OBP/lgOBP) + (SLG/lgSLG) - 1)
function opsPlus(playerObp, playerSlg, teamObp, teamSlg){
  if(!teamObp || !teamSlg) return 0;
  const v = 100 * ((playerObp/teamObp) + (playerSlg/teamSlg) - 1);
  return Math.round(v);
}

// Get all tournament games (across all tournaments) - for season tournament stats
function allTourGames(){return TOURNEY_GAMES;}
function gamesForTour(tid){return TOURNEY_GAMES.filter(g=>g.tournament===tid);}
function leaguePlayed(){return LEAGUE_GAMES.filter(g=>g.stats);}

// Get next upcoming league game(s) — if multiple games on same date, return all
function nextLeagueGames(){
  const upcoming = LEAGUE_GAMES.filter(g => !g.stats);
  if(upcoming.length === 0) return [];
  upcoming.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const nextDate = upcoming[0].date;
  return upcoming.filter(g => g.date === nextDate);
}

// Get unique sorted player roster from a list of games
function rosterFrom(games){
  const set = new Set();
  for(const g of games){if(g.stats) for(const n in g.stats) set.add(n);}
  return Array.from(set).sort();
}

// Format ISO date as "Mon Date" (e.g. "May 11")
function fmtShortDate(iso){
  if(!iso) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y,m,d] = iso.split('-').map(Number);
  return months[m-1] + ' ' + d;
}

// ============== RENDER: HOME ==============
function renderHome(){
  // Compute record from tournament games
  const tgames = allTourGames();
  let w=0, l=0, rf=0, ra=0;
  for(const g of tgames){
    if(g.result==='W') w++; else if(g.result==='L') l++;
    rf += g.rf||0; ra += g.ra||0;
  }
  
  let h = '<div class="gap"></div>';
  
  // League card
  h += '<div class="lbl lbl-purple">2026 League</div>';
  h += `<div class="card card-purple" onclick="showLeague()">
    <div class="lbl lbl-purple">League</div>
    <div class="nm">YRLSPL &mdash; 2026 Season</div>
    <div class="meta">York Region Ladies Slopitch</div>
    <div class="cta">Tap to view schedule &rsaquo;</div>
  </div>`;
  
  // Coming Up Next — League games (one card showing the next game, or both if same day)
  const nextLg = nextLeagueGames();
  if(nextLg.length > 0){
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [y,m,d] = nextLg[0].date.split('-').map(Number);

    const dateStr = days[dt.getUTCDay()] + ' ' + months[m-1] + ' ' + d;
    
    h += `<div class="card-upcoming">
      <div class="lbl lbl-gold">Coming Up Next</div>
      <div class="nm" style="margin-bottom:10px">${dateStr}</div>`;
    
    for(let i=0; i<nextLg.length; i++){
      const g = nextLg[i];
      const prefix = g.venue==='home' ? 'vs' : '@';
      const bdgCls = g.venue==='home' ? 'bdg-home' : 'bdg-away';
      const bdgLbl = g.venue==='home' ? 'HOME' : 'AWAY';
      const sep = i>0 ? 'margin-top:10px;padding-top:10px;border-top:1px dashed #D4DAF0;' : '';
      h += `<div style="display:flex;align-items:center;gap:12px;${sep}">
        <div class="bdg ${bdgCls}">${bdgLbl}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:#0D1B3E">${prefix} ${g.opponent}</div>
          <div style="font-size:12px;color:#5A6B8A;margin-top:2px">${g.time} &nbsp;&middot;&nbsp; ${g.field}</div>
        </div>
      </div>`;
    }
    h += '</div>';
  }
  
  // Split into completed (have games) and upcoming (no games yet)
  const completed = TOURNAMENTS.filter(t => gamesForTour(t.id).length > 0);
  const upcoming = TOURNAMENTS.filter(t => gamesForTour(t.id).length === 0);
  
  // Completed: newest first (descending startDate)
  completed.sort((a,b) => (b.startDate||'').localeCompare(a.startDate||''));
  // Upcoming: nearest first (ascending startDate)
  upcoming.sort((a,b) => (a.startDate||'').localeCompare(b.startDate||''));
  
  if(completed.length > 0){
    h += '<div class="lbl lbl-blue">2026 Tournaments</div>';
    h += '<div class="tour-box">';
    for(const t of completed){
      const gs = gamesForTour(t.id);
      let tw=0, tl=0, trf=0, tra=0;
      for(const g of gs){
        if(g.result==='W') tw++; else if(g.result==='L') tl++;
        trf += g.rf||0; tra += g.ra||0;
      }
      const diff = trf - tra;
      const diffCls = diff > 0 ? 'pos' : (diff < 0 ? 'neg' : 'zero');
      const diffStr = (diff >= 0 ? '+' : '') + diff;
      h += `<div class="tour-row" onclick="showTour('${t.id}')">
        <div class="info">
          <div class="name">${t.name}${t.placement ? ` <span class="place">${t.placement} place</span>` : ''}</div>
          <div class="meta">${t.date} &nbsp;&middot;&nbsp; ${t.location}</div>
        </div>
        <div class="stats">
          <div class="rec">${tw}&ndash;${tl}</div>
          <div class="diff ${diffCls}">${diffStr}</div>
        </div>
        <div class="arr">&rsaquo;</div>
      </div>`;
    }
    h += '</div>';
  }
  
  // Show upcoming tournaments (nearest first); first one flagged "Coming Up Next"
  if(upcoming.length > 0){
    if(completed.length === 0){
      // No completed yet — still need a section label
      h += '<div class="lbl lbl-blue">2026 Tournaments</div>';
    }
    upcoming.forEach((t, i) => {
      const label = t.tentative ? 'Tentative' : (i === 0 ? 'Coming Up Next' : 'Upcoming');
      const meta = t.tentative ? t.location : `${t.location} &nbsp;&middot;&nbsp; ${t.date}`;
      h += `<div class="card-upcoming"${t.tentative ? ' style="border-left-color:#94A3B8;opacity:.9"' : ''}>
        <div class="lbl ${t.tentative ? 'lbl-blue' : 'lbl-gold'}">${label}</div>
        <div class="nm">${t.name}</div>
        <div class="meta">${meta}</div>
      </div>`;
    });
  }
  
  document.getElementById('view-home').innerHTML = h;
}

// ============== STATS TABLE BUILDER ==============
// Builds a sortable stats table from a list of game objects.
// fullCols=true => include OBP/SLG/OPS/wOBA/OPS+. false => game-level (just AVG + wOBA).
function statsTable(games, tid, fullCols){
  const roster = rosterFrom(games);
  if(roster.length === 0){
    return '<div class="empty"><div class="desc">No game data yet for this view.</div></div>';
  }
  
  const teamRaw = sumTeam(games);
  const teamCalc = calc(teamRaw);
  
  // Header columns
  const cols = fullCols
    ? ['G','PA','AB','H','1B','2B','3B','HR','R','RBI','BB','SAC','K','AVG','OBP','SLG','OPS','wOBA','OPS+']
    : ['PA','AB','H','1B','2B','3B','HR','R','RBI','BB','SAC','K','AVG','wOBA'];
  const keys = fullCols
    ? ['g','pa','ab','h','b1','b2','b3','hr','r','rbi','bb','sac','k','avg','obp','slg','ops','woba','opsplus']
    : ['pa','ab','h','b1','b2','b3','hr','r','rbi','bb','sac','k','avg','woba'];
  
  let h = '<div class="tbl-wrap"><table id="'+tid+'" class="tbl"><thead><tr>';
  h += '<th class="cn" data-key="nm" data-tid="'+tid+'" onclick="doSort(this)">Player</th>';
  for(let i=0; i<cols.length; i++){
    const isPa = keys[i] === 'pa';
    h += '<th data-key="'+keys[i]+'" data-tid="'+tid+'" class="'+(isPa?'cpa':'')+'" onclick="doSort(this)">'+cols[i]+'</th>';
  }
  h += '</tr></thead><tbody>';
  
  for(const name of roster){
    const raw = sumStat(games, name);
    const c = calc(raw);
    const ops_p = (teamCalc.obp > 0 && teamCalc.slg > 0) ? opsPlus(c.obp, c.slg, teamCalc.obp, teamCalc.slg) : 0;
    
    h += '<tr>';
    h += '<td class="cn">'+name+'</td>';
    if(fullCols) h += '<td>'+raw.g+'</td>';
    h += '<td class="cpa">'+raw.pa+'</td>';
    h += '<td>'+raw.ab+'</td>';
    h += '<td>'+raw.h+'</td>';
    h += '<td>'+fmtInt(raw.b1)+'</td>';
    h += '<td>'+fmtInt(raw.b2)+'</td>';
    h += '<td>'+fmtInt(raw.b3)+'</td>';
    h += '<td>'+fmtInt(raw.hr)+'</td>';
    h += '<td>'+fmtInt(raw.r)+'</td>';
    h += '<td>'+fmtInt(raw.rbi)+'</td>';
    h += '<td>'+fmtInt(raw.bb)+'</td>';
    h += '<td>'+fmtInt(c.sac)+'</td>';
    h += '<td>'+fmtInt(raw.k)+'</td>';
    h += '<td class="'+colAvg(c.avg)+'">'+fmtAvg(c.avg)+'</td>';
    if(fullCols){
      h += '<td class="'+colObp(c.obp)+'">'+fmtAvg(c.obp)+'</td>';
      h += '<td class="'+colSlg(c.slg)+'">'+fmtAvg(c.slg)+'</td>';
      h += '<td class="'+colOps(c.ops)+'">'+fmtOps(c.ops)+'</td>';
    }
    h += '<td class="'+colWoba(c.woba, teamCalc.woba)+'">'+fmtAvg(c.woba)+'</td>';
    if(fullCols){
      h += '<td class="'+colOpsPlus(ops_p)+'">'+ops_p+'</td>';
    }
    h += '</tr>';
  }
  h += '</tbody><tfoot><tr>';
  h += '<td class="cn">TEAM</td>';
  if(fullCols) h += '<td>&mdash;</td>';
  h += '<td class="cpa">'+teamRaw.pa+'</td>';
  h += '<td>'+teamRaw.ab+'</td>';
  h += '<td>'+teamRaw.h+'</td>';
  h += '<td>'+fmtInt(teamRaw.b1)+'</td>';
  h += '<td>'+fmtInt(teamRaw.b2)+'</td>';
  h += '<td>'+fmtInt(teamRaw.b3)+'</td>';
  h += '<td>'+fmtInt(teamRaw.hr)+'</td>';
  h += '<td>'+fmtInt(teamRaw.r)+'</td>';
  h += '<td>'+fmtInt(teamRaw.rbi)+'</td>';
  h += '<td>'+fmtInt(teamRaw.bb)+'</td>';
  h += '<td>'+fmtInt(teamCalc.sac)+'</td>';
  h += '<td>'+fmtInt(teamRaw.k)+'</td>';
  h += '<td>'+fmtAvg(teamCalc.avg)+'</td>';
  if(fullCols){
    h += '<td>'+fmtAvg(teamCalc.obp)+'</td>';
    h += '<td>'+fmtAvg(teamCalc.slg)+'</td>';
    h += '<td>'+fmtOps(teamCalc.ops)+'</td>';
  }
  h += '<td>'+fmtAvg(teamCalc.woba)+'</td>';
  if(fullCols) h += '<td>100</td>';
  h += '</tr></tfoot></table></div>';
  return h;
}

// ============== SORT ==============
const SS = {};
function doSort(th){
  const key = th.getAttribute('data-key'), tid = th.getAttribute('data-tid');
  const tbl = document.getElementById(tid); if(!tbl) return;
  const prev = SS[tid] || {key:null, dir:-1};
  const dir = (prev.key===key) ? -prev.dir : -1;
  SS[tid] = {key, dir};
  const hs = Array.from(tbl.querySelectorAll('thead th'));
  let ci = -1;
  hs.forEach((h,i)=>{if(h.getAttribute('data-key')===key) ci=i;});
  if(ci<0) return;
  const tb = tbl.querySelector('tbody');
  const rows = Array.from(tb.querySelectorAll('tr'));
  rows.sort((a,b)=>{
    const ta = a.cells[ci].textContent.trim(), tb2 = b.cells[ci].textContent.trim();
    if(key==='nm') return dir * ta.toLowerCase().localeCompare(tb2.toLowerCase());
    const na = parseFloat(ta), nb = parseFloat(tb2);
    const na2 = isNaN(na) ? -999 : na, nb2 = isNaN(nb) ? -999 : nb;
    return dir * (nb2 - na2);
  });
  rows.forEach(r => tb.appendChild(r));
  hs.forEach(h => {h.innerHTML = h.innerHTML.replace(/ [\u25b2\u25bc]$/, '');});
  th.innerHTML = th.innerHTML + (dir<0 ? ' \u25bc' : ' \u25b2');
}

ass="rc-btn rc-primary" onclick="rcOpenAddTournament()">+ Tournament</button><button class="rc-btn" onclick="rcRefresh()" title="Refresh">&#8635;</button></div></div><div class="rc-grid-wrap"><div id="rc-grid-host"></div></div><div style="margin-top:10px;text-align:center;color:#999;font-size:11px">Players sort A&rarr;Z &middot; Tournaments sort by start date &middot; Hover a row to edit</div></div><div id="rc-modal-host"></div></div><script>(function(){const SUPA_URL="https://ymberrikimzqffnqighx.supabase.co";const SUPA_KEY="sb_publishable_nOFqgd5Un1w8xvrRX1GpLQ_K4yJjXeS";const RC_PIN="2016";const POSITIONS=["P","C","1B","2B","3B","SS","OF","UTIL"];let rcData={players:[],tournaments:[],signups:{},decisions:{}};let saveTimer=null;function genId(p){return p+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);}function escapeHtml(s){return String(s||"").replace(/[&<>"\047]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\042":"&quot;","\047":"&#39;"}[c];});}window.rcCheckPin=function(){const v=document.getElementById("rc-pin-input").value;if(v===RC_PIN){rcUnlock();}else{document.getElementById("rc-pin-err").textContent="Incorrect PIN";document.getElementById("rc-pin-input").value="";}};function rcUnlock(){document.getElementById("rc-pingate").style.display="none";document.getElementById("rc-app").style.display="block";rcLoad();}window.rcRefresh=rcLoad;async function rcLoad(){try{const r=await fetch(SUPA_URL+"/rest/v1/royals_signup?id=eq.1&select=*",{headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY}});const rows=await r.json();if(rows[0]&&rows[0].data){const d=rows[0].data;rcData={players:d.players||[],tournaments:d.tournaments||[],signups:d.signups||{},decisions:d.decisions||{}};}rcRender();}catch(e){console.error("Load failed",e);alert("Could not load data: "+e.message);}}function rcSave(){if(saveTimer)clearTimeout(saveTimer);document.getElementById("rc-saving").textContent="saving\u2026";saveTimer=setTimeout(async function(){try{await fetch(SUPA_URL+"/rest/v1/royals_signup?id=eq.1",{method:"PATCH",headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":"application/json"},body:JSON.stringify({data:rcData,updated_at:new Date().toISOString()})});document.getElementById("rc-saving").textContent="";}catch(e){document.getElementById("rc-saving").textContent="save failed";console.error(e);}},400);}function persist(){rcRender();rcSave();}function sortPlayers(a){return a.slice().sort((x,y)=>x.name.localeCompare(y.name,undefined,{sensitivity:"base"}));}function sortTournaments(a){return a.slice().sort((x,y)=>{const xd=x.startDate||"",yd=y.startDate||"";if(!xd&&!yd)return 0;if(!xd)return 1;if(!yd)return -1;return xd.localeCompare(yd);});}function tally(tid){return rcData.players.reduce((s,p)=>s+(rcData.signups[tid+":"+p.id]?1:0),0);}function fmtDate(iso){if(!iso)return "";const [y,m,d]=iso.split("-").map(Number);const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return M[m-1]+" "+d+", "+y;}function rcRender(){const ps=sortPlayers(rcData.players);const ts=sortTournaments(rcData.tournaments);document.getElementById("rc-meta-players").textContent=ps.length+" player"+(ps.length===1?"":"s");document.getElementById("rc-meta-tourns").textContent=ts.length+" tournament"+(ts.length===1?"":"s");const host=document.getElementById("rc-grid-host");if(ps.length===0&&ts.length===0){host.innerHTML="<div class=\"rc-empty\">No players or tournaments yet. Use the buttons above to add them.</div>";return;}let h="<table class=\"rc-grid\"><thead><tr><th class=\"rc-pcell\">Player / Position</th>";for(const t of ts){const meta=[];if(t.location)meta.push(escapeHtml(t.location));if(t.dates)meta.push(escapeHtml(t.dates));h+="<th><div class=\"rc-tname\">"+escapeHtml(t.name)+"</div>";if(meta.length)h+="<div class=\"rc-tmeta\">"+meta.join(" &middot; ")+"</div>";if(!t.startDate)h+="<div class=\"rc-tmeta\" style=\"color:#E8A33D;font-style:italic\">no start date</div>";h+="<div class=\"rc-actions-cell\" style=\"margin:6px 0 0 0\"><button class=\"rc-iconbtn\" onclick=\"rcOpenEditTournament(\047"+t.id+"\047)\" title=\"Edit\">&#9998;</button><button class=\"rc-iconbtn\" onclick=\"rcDelTournament(\047"+t.id+"\047)\" title=\"Delete\">&#10005;</button></div>";h+="</th>";}h+="</tr></thead><tbody>";for(const p of ps){h+="<tr><td class=\"rc-pcell\">"+escapeHtml(p.name)+"<div class=\"rc-pos\">"+escapeHtml(p.position||"")+"</div>"+"<div class=\"rc-actions-cell\"><button class=\"rc-iconbtn\" onclick=\"rcOpenEditPlayer(\047"+p.id+"\047)\" title=\"Edit\">&#9998;</button><button class=\"rc-iconbtn\" onclick=\"rcDelPlayer(\047"+p.id+"\047)\" title=\"Delete\">&#10005;</button></div></td>";for(const t of ts){const checked=!!rcData.signups[t.id+":"+p.id];h+="<td class=\"rc-checkcell\" onclick=\"rcToggle(\047"+t.id+"\047,\047"+p.id+"\047)\"><span class=\"rc-checkbox"+(checked?" rc-checked":"")+"\"></span></td>";}h+="</tr>";}if(ts.length>0){h+="<tr class=\"rc-rowtotal\"><td class=\"rc-pcell\" style=\"background:#F0F2F8\">Tally</td>";for(const t of ts){const c=tally(t.id);const cls=c>=9?"rc-good":c>=6?"rc-mid":c>0?"":"rc-low";h+="<td class=\"rc-tally "+cls+"\">"+c+" / "+ps.length+"</td>";}h+="</tr><tr class=\"rc-rowdec\"><td class=\"rc-pcell\" style=\"background:#FAFBFD\">Going?</td>";for(const t of ts){const d=rcData.decisions[t.id]||"pending";h+="<td style=\"text-align:center\"><div class=\"rc-decision\"><button class=\""+(d==="yes"?"rc-yes":"")+"\" onclick=\"rcDecision(\047"+t.id+"\047,\047yes\047)\">YES</button><button class=\""+(d==="no"?"rc-no":"")+"\" onclick=\"rcDecision(\047"+t.id+"\047,\047no\047)\">NO</button><button class=\""+(d==="pending"?"rc-tbd":"")+"\" onclick=\"rcDecision(\047"+t.id+"\047,\047pending\047)\">TBD</button></div></td>";}h+="</tr>";}h+="</tbody></table>";host.innerHTML=h;}window.rcToggle=function(tid,pid){const k=tid+":"+pid;if(rcData.signups[k])delete rcData.signups[k];else rcData.signups[k]=true;persist();};window.rcDecision=function(tid,val){rcData.decisions[tid]=val;persist();};window.rcDelPlayer=function(id){if(!confirm("Remove this player and all signups?"))return;rcData.players=rcData.players.filter(p=>p.id!==id);Object.keys(rcData.signups).forEach(k=>{if(k.endsWith(":"+id))delete rcData.signups[k];});persist();};window.rcDelTournament=function(id){if(!confirm("Remove this tournament and all signups?"))return;rcData.tournaments=rcData.tournaments.filter(t=>t.id!==id);Object.keys(rcData.signups).forEach(k=>{if(k.startsWith(id+":"))delete rcData.signups[k];});delete rcData.decisions[id];persist();};window.rcCloseModal=function(){document.getElementById("rc-modal-host").innerHTML="";};function modalShell(title,bodyHtml,saveLabel,saveAction){return "<div class=\"rc-modal\" onclick=\"if(event.target===this)rcCloseModal()\"><div class=\"rc-modal-card\"><h3>"+title+"</h3>"+bodyHtml+"<div class=\"rc-modal-actions\"><button class=\"rc-btn\" onclick=\"rcCloseModal()\">Cancel</button><button class=\"rc-btn rc-primary\" onclick=\""+saveAction+"\">"+saveLabel+"</button></div></div></div>";}function playerModalBody(initial){const name=initial?escapeHtml(initial.name):"";const sel=initial&&POSITIONS.indexOf(initial.position)>=0?initial.position:POSITIONS[0];let posBtns="";for(const p of POSITIONS){posBtns+="<button class=\""+(p===sel?"rc-on":"")+"\" onclick=\"this.parentNode.querySelectorAll(\047button\047).forEach(b=>b.classList.remove(\047rc-on\047));this.classList.add(\047rc-on\047);this.parentNode.dataset.value=\047"+p+"\047\">"+p+"</button>";}return "<label>Name</label><input type=\"text\" id=\"rc-pl-name\" value=\""+name+"\" placeholder=\"e.g. Sarah Johnson\" autofocus />"+"<label>Position</label><div class=\"rc-pos-grid\" id=\"rc-pl-pos\" data-value=\""+sel+"\">"+posBtns+"</div>";}window.rcOpenAddPlayer=function(){document.getElementById("rc-modal-host").innerHTML=modalShell("Add Player",playerModalBody(null),"Save","rcSavePlayer(null)");setTimeout(()=>document.getElementById("rc-pl-name").focus(),50);};window.rcOpenEditPlayer=function(id){const p=rcData.players.find(x=>x.id===id);if(!p)return;document.getElementById("rc-modal-host").innerHTML=modalShell("Edit Player",playerModalBody(p),"Save","rcSavePlayer(\047"+id+"\047)");};window.rcSavePlayer=function(id){const name=document.getElementById("rc-pl-name").value.trim();if(!name){alert("Name required");return;}const pos=document.getElementById("rc-pl-pos").dataset.value;if(id){const p=rcData.players.find(x=>x.id===id);if(p){p.name=name;p.position=pos;}}else{rcData.players.push({id:genId("p"),name:name,position:pos});}rcCloseModal();persist();};function tournamentModalBody(initial){const name=initial?escapeHtml(initial.name):"";const loc=initial?escapeHtml(initial.location||""):"";const dates=initial?escapeHtml(initial.dates||""):"";const sd=initial?escapeHtml(initial.startDate||""):"";return "<label>Tournament name</label><input type=\"text\" id=\"rc-t-name\" value=\""+name+"\" placeholder=\"e.g. Summer Slam Classic\" autofocus />"+"<label>Location</label><input type=\"text\" id=\"rc-t-loc\" value=\""+loc+"\" placeholder=\"e.g. Markham, ON\" />"+"<label>Start date (used for sorting)</label><input type=\"date\" id=\"rc-t-sd\" value=\""+sd+"\" />"+"<label>Date(s) display (optional)</label><input type=\"text\" id=\"rc-t-dates\" value=\""+dates+"\" placeholder=\"e.g. July 12&ndash;14\" />";}window.rcOpenAddTournament=function(){document.getElementById("rc-modal-host").innerHTML=modalShell("Add Tournament",tournamentModalBody(null),"Save","rcSaveTournament(null)");setTimeout(()=>document.getElementById("rc-t-name").focus(),50);};window.rcOpenEditTournament=function(id){const t=rcData.tournaments.find(x=>x.id===id);if(!t)return;document.getElementById("rc-modal-host").innerHTML=modalShell("Edit Tournament",tournamentModalBody(t),"Save","rcSaveTournament(\047"+id+"\047)");};window.rcSaveTournament=function(id){const name=document.getElementById("rc-t-name").value.trim();if(!name){alert("Name required");return;}const loc=document.getElementById("rc-t-loc").value.trim();const sd=document.getElementById("rc-t-sd").value;let dates=document.getElementById("rc-t-dates").value.trim();if(!dates&&sd)dates=fmtDate(sd);if(id){const t=rcData.tournaments.find(x=>x.id===id);if(t){t.name=name;t.location=loc;t.dates=dates;t.startDate=sd;}}else{const newT={id:genId("t"),name:name,location:loc,dates:dates,startDate:sd};rcData.tournaments.push(newT);rcData.decisions[newT.id]="pending";}rcCloseModal();persist();};window.showRoyalsC=function(){document.querySelectorAll(".content").forEach(d=>d.style.display="none");document.querySelectorAll("[id^=\"view-\"]").forEach(d=>d.style.display="none");document.getElementById("view-royalsc").style.display="block";window.scrollTo(0,0);};function patchShowFns(){const fns=["showHome","showLStats","showTStats","showLeague","showLeagueRS","showLeaguePO","showTournament","showGame"];for(const n of fns){const orig=window[n];if(typeof orig==="function"&&!orig.__rcPatched){const wrapped=function(){const v=document.getElementById("view-royalsc");if(v)v.style.display="none";return orig.apply(this,arguments);};wrapped.__rcPatched=true;window[n]=wrapped;}}}function attachNavButton(){const buttons=document.querySelectorAll("button[onclick]");let tstats=null;for(const b of buttons){const oc=b.getAttribute("onclick")||"";if(oc.indexOf("showTStats")===0){tstats=b;break;}}if(!tstats||document.getElementById("rc-nav-btn"))return;const nb=tstats.cloneNode(true);nb.id="rc-nav-btn";nb.textContent="RoyalsC";nb.setAttribute("onclick","showRoyalsC()");tstats.parentNode.insertBefore(nb,tstats.nextSibling);}function init(){attachNavButton();patchShowFns();document.addEventListener("keydown",function(e){if(e.key==="Enter"&&document.getElementById("rc-pin-input")===document.activeElement){rcCheckPin();}if(e.key==="Escape"&&document.getElementById("rc-modal-host").innerHTML){rcCloseModal();}});}if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}else{init();}})();</script>
